services:
  - type: web
    name: ml-dl-viz-api
    runtime: python
    repo: https://github.com/DONG-WEI-YANG/ml-dl-visualization
    rootDir: platform/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://dong-wei-yang.github.io
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
